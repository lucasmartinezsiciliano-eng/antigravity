name: Build & Push CRM Docker Image

on:
  push:
    branches: [main]
    paths:
      - 'mission-control/**'
      - '.github/workflows/crm-docker.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./mission-control
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/crm-firmax:latest
